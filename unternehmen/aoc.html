        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-blue: #0062b1;
            --dark-blue: #002777;

            --page-color: #002777;
            --page-color-mid: #0062b1;
            --page-color-light: #e8eef8;
            --white: #ffffff;
            --black: #000000;

        body { font-family: 'Montserrat', sans-serif; line-height: 1.7; color: var(--black); font-size: 17px; overflow-x: hidden; }

          /* ── HEADER ── */
        header { position: fixed; top: 0; left: 0; right: 0; background: var(--dark-blue); z-index: 1000; }
        nav { max-width: 1400px; margin: 0 auto; padding: 0 2.5rem; height: 72px; display: flex; justify-content: space-between; align-items: center; }
        .logo { text-decoration: none; display: flex; align-items: center; height: 100%; padding: 8px 0; transition: opacity 0.3s; }
        .logo:hover { opacity: 0.85; }
        .logo img { height: 100%; width: auto; max-height: 56px; object-fit: contain; }
        nav ul { display: flex; list-style: none; gap: 1.8rem; align-items: center; }
        nav ul li a { text-decoration: none; color: rgba(255,255,255,0.88); font-weight: 500; font-size: 0.85rem; letter-spacing: 0.02em; transition: color 0.3s; position: relative; white-space: nowrap; }
        nav ul li a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--white); transition: width 0.3s; }
        nav ul li a:hover, nav ul li a.active { color: var(--white); }
        nav ul li a:hover::after, nav ul li a.active::after { width: 100%; }
        .header-cta-btn { padding: 0.6rem 1.4rem; background: transparent; color: rgba(255,255,255,0.88); font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 700; border: 2px solid rgba(255,255,255,0.6); border-radius: 50px; cursor: pointer; transition: all 0.3s; text-decoration: none; white-space: nowrap; }
        .header-cta-btn:hover { background: var(--white); color: var(--dark-blue); border-color: var(--white); }
        .burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
        .burger span { display: block; width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: all 0.3s; }
        .burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .burger.open span:nth-child(2) { opacity: 0; }
        .burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        .mobile-menu { display: none; position: fixed; top: 72px; left: 0; right: 0; bottom: 0; background: var(--white); z-index: 999; flex-direction: column; padding: 2rem 2.5rem; overflow-y: auto; }
        .mobile-menu.open { display: flex; }
        .mobile-menu a { text-decoration: none; color: var(--black); font-weight: 600; font-size: 1.3rem; padding: 1.2rem 0; border-bottom: 1px solid #e5e9f0; transition: color 0.2s; }
        .mobile-menu a:hover { color: var(--primary-blue); }
        .mobile-menu .mobile-cta { margin-top: 2rem; padding: 1rem 2rem; background: var(--dark-blue); color: var(--white); border-radius: 50px; text-align: center; font-size: 1rem; border-bottom: none; }
